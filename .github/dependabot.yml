# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Only the github-actions ecosystem is tracked: the package has no runtime
# dependencies (no lockfile; tests import bun:test, node: builtins, and local
# .ts only), so there is no npm/bun manifest for Dependabot to update. Keep the
# SHA-pinned actions in .github/workflows/* current.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
