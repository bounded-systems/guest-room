name: CI

# Gate the repo on `bun test` — the project's source of truth (no tsconfig/tsc;
# Bun's ambient types are the typecheck). Runs on every PR and on pushes to main,
# so main can't silently go red.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  test:
    name: bun test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pin for reproducibility; bump as the project's Bun moves.
          bun-version: 1.3.11
      # No `bun install` — the package has no runtime deps; tests import
      # bun:test, node: builtins, and local .ts only.
      - name: Run tests
        run: bun test
