name: Publish to JSR

# Publishes @bounded-systems/guest-room to JSR on a GitHub Release, and
# validates the package (slow-type + resolvability checks via a dry-run) on every
# PR and on demand — so a publish can never be the first time the package is
# checked. Auth is OIDC: once the package is linked to this repo at
# https://jsr.io/@bounded-systems/guest-room, no token/secret is needed.
on:
  release:
    types: [published]
  pull_request:
  workflow_dispatch:

concurrency:
  group: jsr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  jsr:
    name: jsr publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token JSR exchanges for publish auth (release only)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11
      # Dry-run on PRs / manual dispatch: validates exports, slow types, and that
      # every import resolves — without publishing and without needing auth.
      - name: Validate package (dry-run)
        if: github.event_name != 'release'
        run: bunx jsr publish --dry-run
      # Real publish only from a Release. Version is whatever jsr.json declares;
      # tag the release to match (e.g. v0.1.0 → "version": "0.1.0").
      - name: Publish to JSR
        if: github.event_name == 'release'
        run: bunx jsr publish
